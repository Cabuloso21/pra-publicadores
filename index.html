<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Card com Botão</title>

  <style>
    *{
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body{
      background: #f4f4f4;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card{
      width: 320px;
      background: white;
      border-radius: 18px;
      padding: 20px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.15);
      text-align: center;
    }

    .card img{
      width: 100%;
      border-radius: 12px;
      margin-bottom: 15px;
    }

    .card h2{
      color: #222;
      margin-bottom: 10px;
    }

    .card p{
      color: #666;
      font-size: 14px;
      margin-bottom: 20px;
    }

    .btn{
      display: inline-block;
      padding: 12px 20px;
      background: #007bff;
      color: white;
      text-decoration: none;
      border-radius: 10px;
      transition: 0.3s;
      font-weight: bold;
    }

    .btn:hover{
      background: #0056b3;
      transform: scale(1.05);
    }
  </style>
</head>
<body>

  <div class="card">
    <img src="https://picsum.photos/400/200" alt="Imagem">

    <h2>Meu Card</h2>

    <p>
      Esse é um exemplo de card em HTML e CSS com botão de redirecionamento.
    </p>

    <a href="https://www.google.com" target="_blank" class="btn">
      Acessar Site
    </a>
  </div>

</body>
</html>
