<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lopixe</title>

  <style>
    *{
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body{
      background: #f4f4f4;
    }

    /* Cabeçalho */
    header{
      width: 100%;
      background: #fff;
      padding: 18px;
      text-align: center;
      box-shadow: 0 3px 10px rgba(0,0,0,0.15);
    }

    header h1{
      color: #820AD1;
      font-size: 28px;
      letter-spacing: 1px;
    }

    /* Área principal */
    .container{
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: calc(100vh - 80px);
      padding: 20px;
    }

    /* Card */
    .card{
      width: 320px;
      background: white;
      border-radius: 18px;
      padding: 20px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.15);
      text-align: center;
    }

    .card img{
      width: 100%;
      border-radius: 12px;
      margin-bottom: 15px;
    }

    .card h2{
      color: #222;
      margin-bottom: 10px;
    }

    .card p{
      color: #666;
      font-size: 14px;
      margin-bottom: 20px;
    }

    /* Botão */
    .btn{
      display: inline-block;
      padding: 12px 20px;
      background: #007bff;
      color: white;
      text-decoration: none;
      border-radius: 10px;
      transition: 0.3s;
      font-weight: bold;
    }

    .btn:hover{
      background: #0056b3;
      transform: scale(1.05);
    }
  </style>
</head>
<body>

  <!-- Cabeçalho -->
  <header>
    <h1>Lopixe</h1>
  </header>

  <!-- Conteúdo -->
  <div class="container">
    <div class="card">

      <img src="https://picsum.photos/400/200" alt="Imagem">

      <h2>Meu Card</h2>

      <p>
        Esse é um exemplo de card em HTML e CSS com botão de redirecionamento.
      </p>

      <a href="https://www.google.com" target="_blank" class="btn">
        Acessar Site
      </a>

    </div>
  </div>

</body>
</html>
