<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lopixe</title>

<style>
body {
 font-family: Arial, sans-serif;
 background: #f1f1f1;
 margin: 0;
}

header {
 background: #3498db;
 padding: 15px;
}

.logo {
 color: #fff;
 font-weight: bold;
 font-size: 25px;
 text-align: center;
}

input, select {
 padding: 12px;
 margin: 10px;
 border: 1px solid #ccc;
 border-radius: 8px;
 width: 200px;
}

button {
 padding: 10px;
 margin: 10px;
 font-weight: bold;
 border: none;
 background-color: #3498db;
 color: white;
 border-radius: 8px;
 cursor: pointer;
}

button:hover {
 background-color: #2980b9;
}

.folder-card {
 background: white;
 border-radius: 10px;
 padding: 15px;
 margin: 10px;
 box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

.delete-btn {
 background: #e74c3c;
 margin-top: 10px;
}
</style>
</head>

<body>

<header>
<div class="logo">Lopixe</div>
</header>

<div>
<input type="text" id="folderInput" placeholder="Nome" />
<input type="text" id="subInput" placeholder="Subnome" />

<input type="text" id="clienteInput" placeholder="Nome do cliente" />
<input type="number" id="valorInput" placeholder="Valor R$" />
<input type="date" id="dataInput" />

<select id="statusInput">
  <option value="">Situação</option>
  <option value="Pago">Pago</option>
  <option value="Pendente">Pendente</option>
  <option value="Atrasado">Atrasado</option>
</select>

<button id="addFolderBtn">Adicionar</button>
<button id="saveTxtBtn">Salvar no celular</button>
</div>

<ul id="folderList"></ul>

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
const supabaseUrl = "SUA_URL";
const supabaseKey = "SUA_CHAVE_PUBLICA";
const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

// Inputs
const folderInput = document.getElementById("folderInput");
const subInput = document.getElementById("subInput");
const clienteInput = document.getElementById("clienteInput");
const valorInput = document.getElementById("valorInput");
const dataInput = document.getElementById("dataInput");
const statusInput = document.getElementById("statusInput");

// Botões
const addFolderBtn = document.getElementById("addFolderBtn");
const saveTxtBtn = document.getElementById("saveTxtBtn");

const folderList = document.getElementById("folderList");

// Dados
let folders = JSON.parse(localStorage.getItem("pastas")) || [];

// Salvar local
function saveToLocalStorage() {
  localStorage.setItem("pastas", JSON.stringify(folders));
}

// Renderizar
function renderFolders() {
  folderList.innerHTML = "";

  folders.forEach((folder, index) => {
    const li = document.createElement("li");
    li.className = "folder-card";

    li.innerHTML = `
      <strong>${folder.nome}</strong><br>
      ${folder.subnome}<br><br>

      👤 Cliente: ${folder.cliente}<br>
      💰 Valor: R$ ${folder.valor}<br>
      📅 Data: ${folder.data}<br>
      📌 Status: ${folder.status}
    `;

    const deleteBtn = document.createElement("button");
    deleteBtn.textContent = "Excluir";
    deleteBtn.className = "delete-btn";

    deleteBtn.onclick = () => {
      folders.splice(index, 1);
      saveToLocalStorage();
      renderFolders();
    };

    li.appendChild(deleteBtn);
    folderList.appendChild(li);
  });
}

// Adicionar
addFolderBtn.addEventListener("click", async () => {

  const nome = folderInput.value.trim();
  const subnome = subInput.value.trim();
  const cliente = clienteInput.value.trim();
  const valor = valorInput.value;
  const data = dataInput.value;
  const status = statusInput.value;

  if (!nome || !cliente) {
    alert("Preencha os campos obrigatórios!");
    return;
  }

  const novo = { nome, subnome, cliente, valor, data, status };

  // Salvar local
  folders.push(novo);
  saveToLocalStorage();
  renderFolders();

  // Salvar no Supabase
  const { error } = await supabase.from("formularios").insert([
    {
      nome_formulario: nome,
      nome_cliente: cliente,
      valor: valor,
      data: data,
      situacao_pagamento: status
    }
  ]);

  if (error) {
    console.error("Erro Supabase:", error.message);
  }

  // Limpar campos
  folderInput.value = "";
  subInput.value = "";
  clienteInput.value = "";
  valorInput.value = "";
  dataInput.value = "";
  statusInput.value = "";
});

// Salvar no celular (.txt)
saveTxtBtn.addEventListener("click", () => {

  if (folders.length === 0) {
    alert("Nenhum dado para salvar!");
    return;
  }

  let content = folders.map(folder => 
`Nome: ${folder.nome}
Subnome: ${folder.subnome}
Cliente: ${folder.cliente}
Valor: R$ ${folder.valor}
Data: ${folder.data}
Status: ${folder.status}
---------------------------`
  ).join("\n");

  const blob = new Blob([content], { type: "text/plain" });

  const link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = "dados_formulario.txt";

  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
});

// Inicializar
renderFolders();
</script>

</body>
</html>
